<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Generate Exam Papers</title>
    <style>
        /* Fallback for older browsers */
        .file-drop-area {
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="bg-gray-100 p-8 font-sans">
    <div class="max-w-3xl mx-auto">
        <div class="bg-white rounded-xl shadow-md p-8 mb-8">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">📄 Exam Paper Generator</h1>
            <p class="text-gray-600 mb-6">Upload your MCQ JSON file to generate a professional question paper or answer sheet.</p>

            <form method="post" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}
                
                <!-- JSON file upload -->
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center file-drop-area hover:border-blue-400">
                    <input type="file" name="json_file" id="json_file" class="hidden" accept=".json" required>
                    <label for="json_file" class="cursor-pointer block">
                        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                        </svg>
                        <span class="mt-2 block text-sm font-medium text-gray-700">Click to select JSON file</span>
                        <span id="file-name" class="text-xs text-gray-500">No file chosen</span>
                    </label>
                </div>

                <!-- Institute & Exam Name -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Institute Name</label>
                        <input type="text" name="institute_name" value="ABC College of Excellence" 
                               class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Exam Name</label>
                        <input type="text" name="exam_name" value="Mid‑Term Examination 2026" 
                               class="w-full border border-gray-300 rounded-md px-3 py-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row gap-4 pt-4">
                    <button type="submit" name="action" value="question" formaction="{% url 'generate_question_pdf' %}"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-md shadow transition">
                        📖 Generate Question Paper
                    </button>
                    <button type="submit" name="action" value="answer" formaction="{% url 'generate_answer_pdf' %}"
                            class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-md shadow transition">
                        🔑 Generate Answer Sheet
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 text-sm text-yellow-700">
            <p class="font-medium">📌 JSON Format Reference</p>
            <p class="mt-1">Each question can include <code class="bg-yellow-100 px-1">"previous_year": true</code> or <code class="bg-yellow-100 px-1">"previous_year": "2025"</code> to display a badge.</p>
        </div>
    </div>

    <script>
        document.getElementById('json_file').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name || 'No file chosen';
            document.getElementById('file-name').innerText = fileName;
        });
    </script>
</body>
</html>
