<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam History | LearnEd</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }
        
        .modal-enter {
            animation: modalSlideIn 0.3s ease-out;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .progress-ring {
            transition: stroke-dashoffset 0.5s ease;
        }
        
        .option-hover:hover {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-color: #667eea;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- Navigation Bar -->
  {% include "header.html" %}

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Page Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Exam History</h1>
            <p class="text-gray-600 mt-2">Track your performance and review your exam attempts</p>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8" id="statsContainer">
            <!-- Dynamic stats will be loaded here -->
        </div>

        <!-- Filters -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-8">
            <div class="flex flex-col md:flex-row gap-4 justify-between items-center">
                <div class="relative flex-1 w-full md:w-auto">
                    <i class="ri-search-line absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="Search by subject..." 
                           class="w-full md:w-80 pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent outline-none transition">
                </div>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="filterExams('all')" class="filter-btn px-4 py-2 rounded-lg transition font-medium" data-filter="all">
                        All Exams
                    </button>
                    <button onclick="filterExams('pass')" class="filter-btn px-4 py-2 rounded-lg transition font-medium" data-filter="pass">
                        <i class="ri-checkbox-circle-line"></i> Passed
                    </button>
                    <button onclick="filterExams('fail')" class="filter-btn px-4 py-2 rounded-lg transition font-medium" data-filter="fail">
                        <i class="ri-close-circle-line"></i> Failed
                    </button>
                </div>
                <select id="sortSelect" class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                    <option value="date-desc">📅 Newest First</option>
                    <option value="date-asc">📅 Oldest First</option>
                    <option value="score-desc">⭐ Highest Score</option>
                    <option value="score-asc">⭐ Lowest Score</option>
                </select>
            </div>
        </div>

        <!-- Exams Grid -->
        <div id="examsGrid" class="space-y-6">
            <!-- Loading State -->
            <div class="text-center py-12">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-purple-500 border-t-transparent"></div>
                <p class="mt-4 text-gray-600">Loading your exam history...</p>
            </div>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="mt-8 flex justify-center"></div>
    </div>

    <!-- Exam Details Modal -->
    <div id="examModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden overflow-y-auto">
        <div class="min-h-screen flex items-center justify-center p-4">
            <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full modal-enter max-h-[90vh] overflow-y-auto custom-scrollbar">
                <div class="gradient-bg rounded-t-2xl p-6 sticky top-0 z-10">
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-2xl font-bold text-white" id="modalSubject">Exam Details</h2>
                            <p class="text-white opacity-90 mt-1" id="modalDate"></p>
                        </div>
                        <button onclick="closeModal()" class="text-white hover:bg-white hover:bg-opacity-20 rounded-lg p-2 transition">
                            <i class="ri-close-line text-2xl"></i>
                        </button>
                    </div>
                </div>
                <div class="p-6" id="modalContent">
                    <!-- Dynamic content -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // Exam data from Django
        const examData = {{ exam_attempts|safe }};
        
        let currentFilter = 'all';
        let currentSort = 'date-desc';
        let currentSearch = '';
        let currentPage = 1;
        const itemsPerPage = 5;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderExams();
            setupEventListeners();
        });

        function setupEventListeners() {
            const searchInput = document.getElementById('searchInput');
            let timeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => {
                    currentSearch = e.target.value.toLowerCase();
                    currentPage = 1;
                    renderExams();
                }, 500);
            });

            const sortSelect = document.getElementById('sortSelect');
            sortSelect.addEventListener('change', (e) => {
                currentSort = e.target.value;
                renderExams();
            });
        }

        function filterExams(filter) {
            currentFilter = filter;
            currentPage = 1;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-purple-600', 'text-white');
                btn.classList.add('bg-gray-100', 'text-gray-700');
            });
            const activeBtn = document.querySelector(`.filter-btn[data-filter="${filter}"]`);
            if (activeBtn) {
                activeBtn.classList.remove('bg-gray-100', 'text-gray-700');
                activeBtn.classList.add('bg-purple-600', 'text-white');
            }
            renderExams();
        }

        function getFilteredExams() {
            let filtered = [...examData];
            
            if (currentFilter === 'pass') {
                filtered = filtered.filter(e => e.score_percentage >= 60);
            } else if (currentFilter === 'fail') {
                filtered = filtered.filter(e => e.score_percentage < 60);
            }
            
            if (currentSearch) {
                filtered = filtered.filter(e => 
                    e.subject?.name.toLowerCase().includes(currentSearch)
                );
            }
            
            return filtered;
        }

        function getSortedExams(exams) {
            const sorted = [...exams];
            switch(currentSort) {
                case 'date-desc':
                    return sorted.sort((a, b) => new Date(b.exam_date) - new Date(a.exam_date));
                case 'date-asc':
                    return sorted.sort((a, b) => new Date(a.exam_date) - new Date(b.exam_date));
                case 'score-desc':
                    return sorted.sort((a, b) => b.score_percentage - a.score_percentage);
                case 'score-asc':
                    return sorted.sort((a, b) => a.score_percentage - b.score_percentage);
                default:
                    return sorted;
            }
        }

        function updateStats(exams) {
            const total = exams.length;
            const passed = exams.filter(e => e.score_percentage >= 60).length;
            const failed = total - passed;
            const avgScore = total > 0 ? (exams.reduce((sum, e) => sum + e.score_percentage, 0) / total).toFixed(1) : 0;
            
            const statsHTML = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 card-hover">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Total Exams</p>
                            <p class="text-3xl font-bold text-gray-900 mt-1">${total}</p>
                        </div>
                        <div class="w-12 h-12 gradient-bg rounded-lg flex items-center justify-center">
                            <i class="ri-file-list-line text-white text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 card-hover">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Passed</p>
                            <p class="text-3xl font-bold text-green-600 mt-1">${passed}</p>
                        </div>
                        <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                            <i class="ri-checkbox-circle-line text-green-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 card-hover">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Failed</p>
                            <p class="text-3xl font-bold text-red-600 mt-1">${failed}</p>
                        </div>
                        <div class="w-12 h-12 bg-red-100 rounded-lg flex items-center justify-center">
                            <i class="ri-close-circle-line text-red-600 text-xl"></i>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 card-hover">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-gray-500 text-sm">Avg. Score</p>
                            <p class="text-3xl font-bold text-purple-600 mt-1">${avgScore}%</p>
                        </div>
                        <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
                            <i class="ri-bar-chart-2-line text-purple-600 text-xl"></i>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('statsContainer').innerHTML = statsHTML;
        }

        function renderExams() {
            const filtered = getFilteredExams();
            const sorted = getSortedExams(filtered);
            const totalPages = Math.ceil(sorted.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const paginated = sorted.slice(start, start + itemsPerPage);
            
            updateStats(filtered);
            updatePagination(totalPages);
            
            const grid = document.getElementById('examsGrid');
            
            if (paginated.length === 0) {
                grid.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-xl border border-gray-200">
                        <i class="ri-inbox-line text-6xl text-gray-300"></i>
                        <p class="text-gray-500 mt-4">No exam attempts found</p>
                        <p class="text-gray-400 text-sm mt-2">Start practicing to see your results here</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = paginated.map(exam => {
                const score = exam.score_percentage;
                const isPassed = score >= 60;
                const date = new Date(exam.exam_date);
                const formattedDate = date.toLocaleDateString('en-US', { 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                // Calculate color based on score
                const scoreColor = score >= 70 ? 'text-green-600' : score >= 50 ? 'text-yellow-600' : 'text-red-600';
                const ringColor = score >= 70 ? '#10b981' : score >= 50 ? '#eab308' : '#ef4444';
                const radius = 40;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference - (score / 100) * circumference;
                
                return `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden card-hover">
                        <div class="p-6">
                            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-2">
                                        <span class="px-2 py-1 bg-purple-100 text-purple-700 text-xs rounded-full font-medium">
                                            ${exam.subject?.name || 'General'}
                                        </span>
                                        <span class="px-2 py-1 ${isPassed ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} text-xs rounded-full font-medium">
                                            ${isPassed ? '✓ PASSED' : '✗ FAILED'}
                                        </span>
                                    </div>
                                    <h3 class="text-xl font-semibold text-gray-900 mb-2">
                                        ${exam.subject?.name || 'Subject Exam'}
                                    </h3>
                                    <div class="flex flex-wrap gap-4 text-sm text-gray-600">
                                        <span><i class="ri-calendar-line mr-1"></i>${formattedDate}</span>
                                        <span><i class="ri-time-line mr-1"></i>${exam.time_limit_minutes} mins</span>
                                        <span><i class="ri-question-line mr-1"></i>${exam.total_questions} questions</span>
                                    </div>
                                </div>
                                
                                <div class="flex items-center gap-6">
                                    <!-- Score Circle -->
                                    <div class="relative">
                                        <svg width="100" height="100" class="transform -rotate-90">
                                            <circle cx="50" cy="50" r="40" fill="none" stroke="#e5e7eb" stroke-width="8"/>
                                            <circle cx="50" cy="50" r="40" fill="none" stroke="${ringColor}" stroke-width="8"
                                                    stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
                                                    stroke-linecap="round" class="progress-ring"/>
                                        </svg>
                                        <div class="absolute inset-0 flex items-center justify-center">
                                            <div class="text-center">
                                                <span class="text-2xl font-bold ${scoreColor}">${score}%</span>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- Stats -->
                                    <div class="grid grid-cols-3 gap-3">
                                        <div class="text-center">
                                            <div class="text-2xl font-bold text-green-600">${exam.correct_answers}</div>
                                            <div class="text-xs text-gray-500">Correct</div>
                                        </div>
                                        <div class="text-center">
                                            <div class="text-2xl font-bold text-red-600">${exam.wrong_answers}</div>
                                            <div class="text-xs text-gray-500">Wrong</div>
                                        </div>
                                        <div class="text-center">
                                            <div class="text-2xl font-bold text-yellow-600">${exam.skipped_answers}</div>
                                            <div class="text-xs text-gray-500">Skipped</div>
                                        </div>
                                    </div>
                                    
                                    <button onclick="showExamDetails(${exam.id})" 
                                            class="gradient-bg text-white px-6 py-2 rounded-lg hover:shadow-lg transition transform hover:scale-105">
                                        Review Exam
                                        <i class="ri-arrow-right-line ml-1"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function showExamDetails(examId) {
            const exam = examData.find(e => e.id === examId);
            if (!exam) return;
            
            const date = new Date(exam.exam_date);
            const formattedDate = date.toLocaleDateString('en-US', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
            
            document.getElementById('modalSubject').innerHTML = `${exam.subject?.name || 'Exam'} - Detailed Review`;
            document.getElementById('modalDate').innerHTML = `<i class="ri-calendar-line mr-1"></i>${formattedDate}`;
            
            const questionsHTML = exam.questions.map((q, idx) => `
                <div class="border border-gray-200 rounded-lg overflow-hidden mb-4">
                    <div class="bg-gray-50 p-4 border-b border-gray-200">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <span class="text-sm text-purple-600 font-medium">Question ${idx + 1}</span>
                                <h4 class="text-gray-900 font-medium mt-1">${q.question}</h4>
                            </div>
                            <div class="ml-4">
                                ${q.is_correct ? 
                                    '<span class="inline-flex items-center px-2 py-1 bg-green-100 text-green-700 text-xs rounded-full"><i class="ri-checkbox-circle-fill mr-1"></i>Correct</span>' :
                                    '<span class="inline-flex items-center px-2 py-1 bg-red-100 text-red-700 text-xs rounded-full"><i class="ri-close-circle-fill mr-1"></i>Incorrect</span>'
                                }
                            </div>
                        </div>
                    </div>
                    <div class="p-4 space-y-3">
                        <!-- Options -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                            ${q.options.map(opt => {
                                const isUserAnswer = q.user_answer === opt.number;
                                const isCorrectAnswer = q.correct_answer === opt.number;
                                let bgColor = 'bg-white';
                                let borderColor = 'border-gray-200';
                                let textColor = 'text-gray-700';
                                
                                if (isUserAnswer && isCorrectAnswer) {
                                    bgColor = 'bg-green-50';
                                    borderColor = 'border-green-400';
                                    textColor = 'text-green-700';
                                } else if (isUserAnswer && !isCorrectAnswer) {
                                    bgColor = 'bg-red-50';
                                    borderColor = 'border-red-400';
                                    textColor = 'text-red-700';
                                } else if (isCorrectAnswer) {
                                    bgColor = 'bg-green-50';
                                    borderColor = 'border-green-400';
                                    textColor = 'text-green-700';
                                }
                                
                                return `
                                    <div class="${bgColor} border ${borderColor} rounded-lg p-3 option-hover transition">
                                        <div class="flex items-start gap-3">
                                            <div class="flex-shrink-0">
                                                <div class="w-6 h-6 rounded-full ${isUserAnswer ? 'bg-purple-600 text-white' : 'bg-gray-200 text-gray-600'} flex items-center justify-center text-xs font-medium">
                                                    ${String.fromCharCode(64 + opt.number)}
                                                </div>
                                            </div>
                                            <div class="flex-1">
                                                <p class="${textColor} text-sm">${opt.text}</p>
                                                ${isUserAnswer && isCorrectAnswer ? '<p class="text-xs text-green-600 mt-1"><i class="ri-checkbox-circle-fill"></i> Your answer (Correct)</p>' : ''}
                                                ${isUserAnswer && !isCorrectAnswer ? '<p class="text-xs text-red-600 mt-1"><i class="ri-close-circle-fill"></i> Your answer (Wrong)</p>' : ''}
                                                ${!isUserAnswer && isCorrectAnswer ? '<p class="text-xs text-green-600 mt-1"><i class="ri-information-line"></i> Correct answer</p>' : ''}
                                            </div>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                        
                        <!-- Explanation -->
                        ${q.explanation ? `
                            <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 mt-3">
                                <div class="flex items-start gap-2">
                                    <i class="ri-lightbulb-line text-blue-600 mt-0.5"></i>
                                    <div>
                                        <p class="text-sm font-medium text-blue-900">Explanation</p>
                                        <p class="text-sm text-blue-800 mt-1">${q.explanation}</p>
                                    </div>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
            
            const summaryHTML = `
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
                    <div class="bg-gradient-to-r from-green-50 to-green-100 rounded-lg p-4 text-center">
                        <i class="ri-checkbox-circle-line text-2xl text-green-600"></i>
                        <p class="text-2xl font-bold text-green-600 mt-1">${exam.correct_answers}</p>
                        <p class="text-sm text-green-700">Correct Answers</p>
                    </div>
                    <div class="bg-gradient-to-r from-red-50 to-red-100 rounded-lg p-4 text-center">
                        <i class="ri-close-circle-line text-2xl text-red-600"></i>
                        <p class="text-2xl font-bold text-red-600 mt-1">${exam.wrong_answers}</p>
                        <p class="text-sm text-red-700">Wrong Answers</p>
                    </div>
                    <div class="bg-gradient-to-r from-yellow-50 to-yellow-100 rounded-lg p-4 text-center">
                        <i class="ri-skip-forward-line text-2xl text-yellow-600"></i>
                        <p class="text-2xl font-bold text-yellow-600 mt-1">${exam.skipped_answers}</p>
                        <p class="text-sm text-yellow-700">Skipped Answers</p>
                    </div>
                </div>
                <div class="mb-6">
                    <div class="bg-gray-100 rounded-full h-3 overflow-hidden">
                        <div class="gradient-bg h-3 rounded-full transition-all duration-500" style="width: ${exam.score_percentage}%"></div>
                    </div>
                    <div class="flex justify-between mt-2 text-sm text-gray-600">
                        <span>Overall Score</span>
                        <span class="font-bold">${exam.score_percentage}%</span>
                    </div>
                </div>
                <h3 class="text-lg font-bold text-gray-900 mb-4 flex items-center">
                    <i class="ri-questionnaire-line mr-2 text-purple-600"></i>
                    Question Review (${exam.questions.length} Questions)
                </h3>
            `;
            
            document.getElementById('modalContent').innerHTML = summaryHTML + questionsHTML;
            document.getElementById('examModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('examModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
        
        function updatePagination(totalPages) {
            const paginationDiv = document.getElementById('pagination');
            if (totalPages <= 1) {
                paginationDiv.innerHTML = '';
                return;
            }
            
            let html = '<nav class="flex gap-2">';
            
            if (currentPage > 1) {
                html += `<button onclick="changePage(${currentPage - 1})" class="px-3 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition">Previous</button>`;
            }
            
            for (let i = 1; i <= Math.min(totalPages, 5); i++) {
                const isActive = i === currentPage;
                html += `<button onclick="changePage(${i})" class="px-3 py-2 ${isActive ? 'gradient-bg text-white' : 'bg-white text-gray-700 border border-gray-300'} rounded-lg hover:shadow transition">${i}</button>`;
            }
            
            if (currentPage < totalPages) {
                html += `<button onclick="changePage(${currentPage + 1})" class="px-3 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition">Next</button>`;
            }
            
            html += '</nav>';
            paginationDiv.innerHTML = html;
        }
        
        function changePage(page) {
            currentPage = page;
            renderExams();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // Close modal on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
        
        // Initialize filter buttons styling
        document.querySelectorAll('.filter-btn').forEach(btn => {
            if (btn.getAttribute('data-filter') === 'all') {
                btn.classList.add('bg-purple-600', 'text-white');
            } else {
                btn.classList.add('bg-gray-100', 'text-gray-700');
            }
        });
    </script>
</body>
</html>
