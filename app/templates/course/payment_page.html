<!-- templates/course/payment_page.html -->

<!DOCTYPE html>
<html>
<head>
    <title>Payment Page</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 40px;
        }

        .box {
            width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ddd;
        }

        .course-block {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        #msg {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">

    <div class="course-block">
        <h2>{{ course.name }}</h2>
        <p>{{ course.description }}</p>
    </div>

    <form id="paymentForm">

        {% csrf_token %}

        <input
            type="hidden"
            name="course_id"
            value="{{ course.id }}"
        >

        <label>Payment System</label>

        <select
            name="payment_system"
            required
        >
            <option value="">
                Choose Payment System
            </option>

            <option value="bkash">
                Bkash
            </option>

            <option value="nagad">
                Nagad
            </option>

            <option value="rocket">
                Rocket
            </option>
        </select>

        <label>Select Month</label>

        <select
            name="month"
            required
        >
            <option value="">
                Choose Duration
            </option>

            <option value="1">
                1 Month
            </option>

            <option value="6">
                6 Months
            </option>

            <option value="12">
                12 Months
            </option>
        </select>

        <label>Transaction ID</label>

        <input
            type="text"
            name="transaction_id"
            required
            placeholder="Enter transaction id"
        >

        <button type="submit">
            Submit Payment
        </button>

    </form>

    <div id="msg"></div>

</div>


<script>
document
.getElementById("paymentForm")
.addEventListener(
    "submit",
    function(e) {
        e.preventDefault();

        let formData = new FormData(this);

        fetch(
            "{% url 'submit_payment' %}",
            {
                method: "POST",
                body: formData
            }
        )
        .then(response => response.json())
        .then(data => {
            document.getElementById("msg").innerHTML =
                data.message;
        });
    }
);
</script>

</body>
</html>
