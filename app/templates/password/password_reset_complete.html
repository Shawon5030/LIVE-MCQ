<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>পাসওয়ার্ড রিসেট সম্পন্ন | Live MCQ™</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3333FF',
                        secondary: '#2A2C8D',
                        accent: '#FF6600',
                        headline: '#1C1C1D',
                        body: '#546078',
                        dark: '#39374A',
                        light: '#FAF7F4',
                        white: '#FFFFFF',
                    },
                    fontFamily: {
                        'figtree': ['Figtree', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        'fade-in': 'fadeIn 0.8s cubic-bezier(0, 0, 0.2, 1) forwards',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .bg-fluid-gradient {
            background: radial-gradient(circle at 80% 3%, #D2D2FF, rgba(255, 255, 255, 0) 35%),
                        radial-gradient(circle at 60% 60%, #FFE1CE, rgba(255, 255, 255, 0) 45%),
                        radial-gradient(circle at 36% 65%, #D2D2FF, rgba(255, 255, 255, 0) 9%);
        } 
        
        .login-link:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="font-figtree bg-fluid-gradient">
    {% include "header.html" %}

    <div class="min-h-screen py-24 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md mx-auto">
            <div class="bg-white rounded-3xl shadow-xl p-8 animate-fade-in-up text-center">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-check-circle text-green-600 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-headline mb-4">পাসওয়ার্ড রিসেট সম্পন্ন</h1>
                <p class="text-body text-sm mb-6">
                    আপনার পাসওয়ার্ড সফলভাবে পরিবর্তন করা হয়েছে। এখন আপনি নতুন পাসওয়ার্ড দিয়ে লগইন করতে পারেন।
                </p>

                <div class="space-y-4">
                    <a href="{% url 'login_page' %}" class="block w-full bg-primary hover:bg-secondary text-white py-3 rounded-full font-semibold transition text-center">
                        লগইন করুন
                    </a>
                    <p class="text-sm text-body">
                        <a href="{% url 'home_page' %}" class="text-primary font-semibold hover:underline">হোমপেজে ফিরে যান</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    {% include "footer.html" %}
</body>
</html>
