<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ExamForge — Quantum Practice Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3333FF',
                        secondary: '#2A2C8D',
                        accent: '#FF6600',
                        headline: '#1C1C1D',
                        body: '#546078',
                        dark: '#39374A',
                        light: '#FAF7F4',
                        white: '#FFFFFF',
                    },
                    fontFamily: {
                        'figtree': ['Figtree', 'sans-serif'],
                        'space': ['Space Grotesk', 'sans-serif'],
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards',
                        'fade-in': 'fadeIn 0.8s cubic-bezier(0, 0, 0.2, 1) forwards',
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'marquee': 'marqueeScroll 20s linear infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(40px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        marqueeScroll: {
                            '0%': { transform: 'translateX(0)' },
                            '100%': { transform: 'translateX(-50%)' },
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
            color: #eef2ff;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #111827;
        }
        ::-webkit-scrollbar-thumb {
            background: #2dd4bf;
            border-radius: 8px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* glassmorphic core */
        .glass-card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }

        .glass-card:hover {
            border-color: rgba(0, 229, 255, 0.5);
            box-shadow: 0 0 18px rgba(0, 229, 255, 0.1);
        }

        .btn {
            padding: 0.6rem 1.3rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: none;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(115deg, #06b6d4, #8b5cf6);
            color: white;
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.5);
        }

        .btn-outline {
            background: rgba(6, 182, 212, 0.08);
            border: 1px solid rgba(6, 182, 212, 0.5);
            color: #67e8f9;
        }

        .btn-outline:hover {
            background: rgba(6, 182, 212, 0.2);
            border-color: #22d3ee;
        }

        .btn-save {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: #34d399;
        }

        .btn-save:hover {
            background: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 8px #10b98140;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.5);
            color: #f87171;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.3);
        }

        .content-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            padding: 1rem 1.2rem;
            margin-bottom: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .content-card:hover {
            border-color: #2dd4bf;
            transform: translateX(5px) translateY(-2px);
            background: linear-gradient(120deg, rgba(45,212,191,0.05), rgba(139,92,246,0.05));
        }

        /* option styles */
        .option-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 0.65rem;
            font-weight: 500;
        }
        .option-btn.selected {
            border-left: 4px solid #2dd4bf;
            background: rgba(45,212,191,0.12);
        }
        .option-btn.correct-highlight {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            box-shadow: 0 0 6px #10b98160;
        }
        .option-btn.wrong-highlight {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            text-decoration: line-through;
        }
        .option-key {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 229, 255, 0.15);
            border-radius: 12px;
            font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2dd4bf, #a78bfa);
            width: 0%;
            transition: width 0.3s ease;
        }

        .breadcrumb {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #9ca3af;
        }
        .breadcrumb-item {
            cursor: pointer;
            transition: color 0.2s;
        }
        .breadcrumb-item:hover {
            color: #2dd4bf;
        }

        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #1f2937;
            backdrop-filter: blur(12px);
            border-left: 5px solid #2dd4bf;
            padding: 0.9rem 1.8rem;
            border-radius: 1rem;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s, transform 0.2s;
            transform: translateY(10px);
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .hidden {
            display: none;
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 0.9fr;
            gap: 1.8rem;
        }

        .dot-nav {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #334155;
            transition: all 0.2s;
            cursor: pointer;
        }
        .dot.answered {
            background: #10b981;
            box-shadow: 0 0 4px #10b981;
        }
        .dot.active-dot {
            background: #2dd4bf;
            transform: scale(1.3);
            box-shadow: 0 0 6px cyan;
        }

        .loader {
            border: 2px solid rgba(45,212,191,0.2);
            border-top: 2px solid #2dd4bf;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 860px) {
            .grid-2 { grid-template-columns: 1fr; }
            .container { padding: 1rem; }
        }

        .badge-neon {
            background: rgba(0, 229, 255, 0.2);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        h1 {
            background: linear-gradient(135deg, #ffffff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>

    {% include "header.html" %}
<div class="container">
    <!-- SETUP PAGE (BROWSE) -->
    <div id="setup-page">
        <div class="flex-between" style="margin-bottom: 1.5rem;">
            <div>
                <h1 style="font-size: 2.1rem;"><i class="fas fa-brain"></i> ExamForge · Practice Forge</h1>
                <p style="color:#9ca3af; margin-top: 6px;">Explore subjects & resume mastery — random mode = explorer (no save)</p>
            </div>
            <button id="reset-all-btn" class="btn btn-danger"><i class="fas fa-trash-alt"></i> Wipe all progress</button>
        </div>
        <div class="grid-2">
            <div class="glass-card">
                <div class="breadcrumb" id="breadcrumb">
                    <span class="breadcrumb-item" data-level="">📁 All Domains</span>
                </div>
                <div id="content-list"><div class="loader"></div></div>
            </div>
            <div class="glass-card">
                <h3 style="margin-bottom: 1rem; display: flex; gap: 8px;"><i class="fas fa-history"></i> 📌 Saved Sessions</h3>
                <div id="progress-list" style="max-height: 380px; overflow-y: auto;">
                    <div style="text-align:center; color:#6b7280;">Loading sessions...</div>
                </div>
                <div class="mt-4" style="margin-top: 1.2rem;">
                    <label style="display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 10px 14px; border-radius: 2rem; cursor: pointer;">
                        <input type="checkbox" id="random-order-checkbox" style="width: 18px; height: 18px;">
                        <span>🎲 <strong>Random order</strong> (answers are NOT saved, pure training)</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- PRACTICE PAGE (ACTIVE QUIZ) -->
    <div id="practice-page" class="hidden">
        <div class="flex-between mb-4" style="margin-bottom: 1.2rem;">
            <button id="back-to-setup" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Library</button>
            <div style="display: flex; gap: 12px;">
                <button id="remember-me-btn" class="btn btn-save"><i class="fas fa-save"></i> Save progress</button>
                <button id="start-fresh-btn" class="btn btn-outline"><i class="fas fa-eraser"></i> Start fresh</button>
            </div>
        </div>
        <div class="glass-card">
            <div class="flex-between mb-3">
                <span id="question-counter" class="badge-neon"><i class="far fa-question-circle"></i> 0 / 0</span>
                <div class="progress-bar" style="width: 200px;"><div id="practice-progress" class="progress-fill"></div></div>
                <span id="random-badge" class="badge-neon">Random: OFF</span>
            </div>
            <h2 id="level-title" style="font-size: 1.3rem; font-weight: 600; background: linear-gradient(130deg,#c4b5fd,#2dd4bf); -webkit-background-clip:text; -webkit-text-fill-color:transparent;"></h2>
            <div id="question-text" style="font-size: 1.2rem; margin: 1.2rem 0; line-height: 1.5;"></div>
            <div id="options-container"></div>
            <div id="explanation-container" class="hidden" style="margin-top: 1rem; padding: 1rem; background: rgba(0,0,0,0.5); border-radius: 1rem; border-left: 4px solid #2dd4bf;"></div>
            <div class="flex-between mt-4" style="margin-top: 1.8rem;">
                <button id="prev-question" class="btn btn-outline"><i class="fas fa-chevron-left"></i> Previous</button>
                <div id="dot-nav" class="dot-nav"></div>
                <button id="next-question" class="btn btn-primary">Next <i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<script>
    // ---------- GLOBAL STATE ----------
    let currentPath = [];           // [{type, id, name}]
    let practiceData = null;        // { questions, userAnswers, currentIndex, levelKey, levelName, randomMode, originalQuestionsIds }
    let csrfToken = '{{ csrf_token }}';

    // helpers
    function showToast(msg, type = 'info') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2800);
    }

    async function fetchWithLoader(loaderId, fn) {
        const container = document.getElementById(loaderId);
        if(container && loaderId === 'content-list') container.innerHTML = '<div class="loader"></div>';
        await fn();
    }

    // fetch content tree
    async function fetchContent() {
        let params = new URLSearchParams();
        for (let item of currentPath) params.set(`${item.type}_id`, item.id);
        try {
            const resp = await fetch(`/api/practice/content/?${params.toString()}`);
            const data = await resp.json();
            renderContent(data);
            updateBreadcrumb();
        } catch(e) {
            document.getElementById('content-list').innerHTML = '<div style="padding:2rem;text-align:center;">⚠️ Error loading content</div>';
            showToast('Network error', 'error');
        }
    }

    function renderContent(data) {
        const container = document.getElementById('content-list');
        if (!container) return;
        if (data.type === 'subjects' || data.type === 'chapters' || data.type === 'lessons' || data.type === 'sublessons') {
            let itemsList = data.items || [];
            if (itemsList.length === 0) {
                container.innerHTML = '<div style="padding:2rem;text-align:center;">✨ No content yet</div>';
                return;
            }
            container.innerHTML = itemsList.map(item => {
                let badge = item.has_children ? '<i class="fas fa-folder-open"></i> has nested' : '<i class="fas fa-bolt"></i> practice ready';
                return `
                    <div class="content-card" onclick="selectNode('${data.type}', ${item.id}, '${escapeHtml(item.name)}', ${item.has_children}, ${item.mcq_count || 0})">
                        <div class="flex-between">
                            <div><strong>📘 ${escapeHtml(item.name)}</strong></div>
                            <div style="color:#2dd4bf;">📊 ${item.mcq_count || 0} Qs</div>
                        </div>
                        <small style="color:#9ca3af;">${badge}</small>
                    </div>
                `;
            }).join('');
        } 
        else if (data.type === 'direct') {
            container.innerHTML = `
                <div class="content-card" onclick="startPractice('${data.level_type}', ${data.level_id}, '${escapeHtml(data.level_name)}')">
                    <div class="flex-between">
                        <div><strong>🎯 Practice: ${escapeHtml(data.level_name)}</strong></div>
                        <div><i class="fas fa-play-circle"></i> ${data.mcq_count} questions</div>
                    </div>
                    <small>🔥 Click to ignite practice session</small>
                </div>
            `;
        } else {
            container.innerHTML = '<div>Unsupported view</div>';
        }
    }

    window.selectNode = (type, id, name, hasChildren, mcqCount) => {
        let mappedType = type === 'subjects' ? 'subject' : (type === 'chapters' ? 'chapter' : (type === 'lessons' ? 'lesson' : 'sublesson'));
        currentPath.push({ type: mappedType, id, name });
        if (!hasChildren && mcqCount > 0) {
            startPractice(mappedType, id, name);
        } else {
            fetchContent();
        }
    };

    function updateBreadcrumb() {
        const bread = document.getElementById('breadcrumb');
        let html = `<span class="breadcrumb-item" onclick="navigateToLevel(-1)"><i class="fas fa-home"></i> All</span>`;
        currentPath.forEach((item, idx) => {
            html += `<span> › </span><span class="breadcrumb-item" onclick="navigateToLevel(${idx})">${escapeHtml(item.name)}</span>`;
        });
        bread.innerHTML = html;
    }

    function navigateToLevel(levelIndex) {
        if (levelIndex === -1) currentPath = [];
        else currentPath = currentPath.slice(0, levelIndex + 1);
        fetchContent();
    }

    // ---------- PRACTICE CORE ----------
    async function startPractice(levelType, levelId, levelName) {
        const randomOrder = document.getElementById('random-order-checkbox').checked;
        try {
            const resp = await fetch('/api/practice/start/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({ level_type: levelType, level_id: levelId, random_order: randomOrder })
            });
            const data = await resp.json();
            if (data.error) { showToast(data.error, 'error'); return; }
            let questions = data.questions;
            let userAnswers = data.saved_answers ? [...data.saved_answers] : new Array(questions.length).fill(null);
            let currentIndex = data.saved_index !== undefined ? data.saved_index : 0;
            practiceData = {
                questions: questions,
                userAnswers: userAnswers,
                currentIndex: currentIndex,
                levelKey: data.level_key,
                levelName: data.level_name || levelName,
                randomMode: data.random_order,
                originalQuestionsOrder: questions.map(q => q.id)
            };
            renderPracticeInterface();
            document.getElementById('setup-page').classList.add('hidden');
            document.getElementById('practice-page').classList.remove('hidden');
        } catch(err) { showToast('Failed to start practice', 'error'); }
    }

    // render practice with correct/wrong visual feedback & correct answer highlighting
    function renderPracticeInterface() {
        if (!practiceData) return;
        const q = practiceData.questions[practiceData.currentIndex];
        const currentAnswer = practiceData.userAnswers[practiceData.currentIndex];
        const isAnswered = currentAnswer !== null;
        const correctOption = q.correct;   // 1-indexed

        document.getElementById('question-counter').innerHTML = `<i class="far fa-file-alt"></i> ${practiceData.currentIndex+1} / ${practiceData.questions.length}`;
        let progressPercent = ((practiceData.currentIndex+1) / practiceData.questions.length) * 100;
        document.getElementById('practice-progress').style.width = `${progressPercent}%`;
        document.getElementById('level-title').innerHTML = `<i class="fas fa-gem"></i> ${escapeHtml(practiceData.levelName)} ${practiceData.randomMode ? '⚡ random mode' : '📘 tracked'}`;
        document.getElementById('question-text').innerHTML = q.question;
        document.getElementById('random-badge').innerHTML = practiceData.randomMode ? '🎲 Random: ON' : '🔒 Random: OFF';

        // generate options with feedback
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const key = idx+1;
            let additionalClass = '';
            let icon = '';
            // if answered, show correctness
            if (isAnswered) {
                if (key === correctOption) {
                    additionalClass = 'correct-highlight';
                    icon = '<i class="fas fa-check-circle" style="color:#10b981; margin-left:auto;"></i>';
                } else if (key === currentAnswer && currentAnswer !== correctOption) {
                    additionalClass = 'wrong-highlight';
                    icon = '<i class="fas fa-times-circle" style="color:#ef4444; margin-left:auto;"></i>';
                } else if (key === currentAnswer && currentAnswer === correctOption) {
                    additionalClass = 'correct-highlight';
                    icon = '<i class="fas fa-check-double" style="color:#10b981; margin-left:auto;"></i>';
                }
            }
            const selectedClass = (currentAnswer === key && !isAnswered ? 'selected' : (currentAnswer === key && isAnswered ? 'selected' : ''));
            optionsHtml += `<div class="option-btn ${additionalClass} ${selectedClass}" onclick="selectAnswer(${key})">
                                <span class="option-key">${String.fromCharCode(64+key)}</span>
                                <span style="flex:1;">${escapeHtml(opt)}</span>
                                ${icon}
                            </div>`;
        });
        document.getElementById('options-container').innerHTML = optionsHtml;

        // explanation + show correct answer string
        const explanationDiv = document.getElementById('explanation-container');
        if (isAnswered) {
            const isCorrect = currentAnswer === correctOption;
            const correctLetter = String.fromCharCode(64+correctOption);
            const correctText = q.options[correctOption-1];
            explanationDiv.innerHTML = `
                <div style="display:flex; gap:8px; align-items:center; margin-bottom:6px;">
                    <span style="font-size:1.3rem;">${isCorrect ? '✅' : '❌'}</span>
                    <strong>${isCorrect ? 'Correct!' : `Wrong — correct answer: ${correctLetter}. ${escapeHtml(correctText)}`}</strong>
                </div>
                <p style="margin-top:5px;">📖 <strong>Explanation:</strong> ${escapeHtml(q.explanation)}</p>
            `;
            explanationDiv.classList.remove('hidden');
        } else {
            explanationDiv.classList.add('hidden');
        }

        // dot navigation
        const dotNav = document.getElementById('dot-nav');
        if (practiceData.questions.length <= 50) {
            dotNav.innerHTML = practiceData.questions.map((_, i) => {
                let answeredClass = practiceData.userAnswers[i] !== null ? 'answered' : '';
                let activeClass = practiceData.currentIndex === i ? 'active-dot' : '';
                return `<div class="dot ${answeredClass} ${activeClass}" onclick="jumpToQuestion(${i})" title="Question ${i+1}"></div>`;
            }).join('');
        } else dotNav.innerHTML = `<span class="badge-neon">${practiceData.questions.length} questions — use Prev/Next</span>`;

        document.getElementById('prev-question').disabled = practiceData.currentIndex === 0;
    }

    window.selectAnswer = (key) => {
        if (practiceData.userAnswers[practiceData.currentIndex] !== null) return;
        practiceData.userAnswers[practiceData.currentIndex] = key;
        renderPracticeInterface();
        // auto-save only if NOT random mode
        if (!practiceData.randomMode) autoSaveProgress();
    };

    async function autoSaveProgress() {
        if (!practiceData || practiceData.randomMode) return;
        try {
            const resp = await fetch('/api/practice/save/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                body: JSON.stringify({
                    level_key: practiceData.levelKey,
                    user_answers: practiceData.userAnswers,
                    questions_order: practiceData.questions.map(q => q.id),
                    current_index: practiceData.currentIndex,
                    random_order: practiceData.randomMode,
                    level_name: practiceData.levelName
                })
            });
            if (resp.ok) { 
                showToast('✨ Progress synced', 'info');
                loadProgressList();
            }
        } catch(e) {}
    }

    window.rememberMeSave = async () => {
        if (practiceData.randomMode) { showToast('Random mode active: progress cannot be saved', 'error'); return; }
        await autoSaveProgress();
        showToast('Saved checkpoint', 'success');
    };

    window.startFresh = async () => {
        if (!practiceData) return;
        if (!confirm(`Delete saved progress for "${practiceData.levelName}" and restart?`)) return;
        try {
            await fetch(`/api/practice/delete/?level_key=${practiceData.levelKey}`, { headers: { 'X-CSRFToken': csrfToken } });
            practiceData.userAnswers = new Array(practiceData.questions.length).fill(null);
            practiceData.currentIndex = 0;
            renderPracticeInterface();
            showToast('Fresh start — progress erased');
            loadProgressList();
        } catch(e) { showToast('Error resetting', 'error'); }
    };

    window.jumpToQuestion = (idx) => {
        practiceData.currentIndex = idx;
        renderPracticeInterface();
    };
    window.nextQuestion = () => {
        if (practiceData.currentIndex < practiceData.questions.length - 1) {
            practiceData.currentIndex++;
            renderPracticeInterface();
        } else showToast('🏁 End of set — review or return', 'info');
    };
    window.prevQuestion = () => {
        if (practiceData.currentIndex > 0) {
            practiceData.currentIndex--;
            renderPracticeInterface();
        }
    };
    window.backToSetup = () => {
        document.getElementById('practice-page').classList.add('hidden');
        document.getElementById('setup-page').classList.remove('hidden');
        practiceData = null;
        fetchContent();
        loadProgressList();
    };

    // ---------- PROGRESS LIST & RESUME ----------
    async function loadProgressList() {
        try {
            const resp = await fetch('/api/practice/progress-list/');
            const data = await resp.json();
            const container = document.getElementById('progress-list');
            if (!data.progress || data.progress.length === 0) {
                container.innerHTML = '<div style="padding:1rem; text-align:center; color:#6b7280;"><i class="far fa-folder-open"></i> No saved sessions</div>';
                return;
            }
            container.innerHTML = data.progress.map(p => `
                <div class="content-card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.7rem;">
                    <div>
                        <strong><i class="fas fa-bookmark"></i> ${escapeHtml(p.level_name)}</strong><br>
                        <small style="color:#9ca3af;">📌 ${p.answered}/${p.total} answered · ${new Date(p.last_updated).toLocaleTimeString()}</small>
                    </div>
                    <button class="btn btn-outline" style="padding:0.3rem 0.9rem;" onclick="resumeSaved('${p.level_key}', '${escapeHtml(p.level_name)}')">Resume →</button>
                </div>
            `).join('');
        } catch(e) { console.warn(e); }
    }

    window.resumeSaved = async (levelKey, levelNameDisplay) => {
        const parts = levelKey.split('_');
        if (parts.length !== 2) return;
        const levelType = parts[0];
        const levelId = parseInt(parts[1]);
        // force random mode off for resume to respect saved order
        const randomCheck = document.getElementById('random-order-checkbox');
        const wasRandom = randomCheck.checked;
        if (wasRandom) randomCheck.checked = false;
        await startPractice(levelType, levelId, levelNameDisplay);
        if (wasRandom) randomCheck.checked = true; // revert checkbox but practice already started with random false (resume needs order)
        showToast(`Resumed: ${levelNameDisplay}`, 'success');
    };

    window.resetAllProgress = async () => {
        if (!confirm('⚠️ Permanently DELETE all practice progress across topics?')) return;
        try {
            const resp = await fetch('/api/practice/progress-list/');
            const data = await resp.json();
            for (let p of data.progress) {
                await fetch(`/api/practice/delete/?level_key=${p.level_key}`, { headers: { 'X-CSRFToken': csrfToken } });
            }
            showToast('All progress wiped clean');
            loadProgressList();
            fetchContent();
            if (practiceData) backToSetup();
        } catch(e) { showToast('Reset error', 'error'); }
    };

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // EVENT LISTENERS
    document.getElementById('back-to-setup').onclick = backToSetup;
    document.getElementById('remember-me-btn').onclick = rememberMeSave;
    document.getElementById('start-fresh-btn').onclick = startFresh;
    document.getElementById('prev-question').onclick = prevQuestion;
    document.getElementById('next-question').onclick = nextQuestion;
    document.getElementById('reset-all-btn').onclick = resetAllProgress;

    // initial data
    fetchContent();
    loadProgressList();
</script>
</body>
</html>
